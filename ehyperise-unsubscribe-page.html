<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unsubscribe - Ehyperise</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #333; }
  .box { max-width: 480px; width: 100%; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; text-align: center; }
  h1 { font-size: 24px; color: #0F172A; margin-bottom: 8px; }
  p { font-size: 16px; color: #475569; margin-bottom: 24px; line-height: 1.5; }
  input[type=email] { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 16px; }
  input[type=email]:focus { border-color: #54B435; }
  button { width: 100%; padding: 14px; background: #54B435; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
  button:hover { background: #48a02e; }
  .logo { margin-bottom: 24px; } .logo svg { width: 48px; height: 48px; }
  .hidden { display: none; }
  .success { padding: 20px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; color: #166534; margin-bottom: 16px; display: none; }
  .error { padding: 20px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; color: #991b1b; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none"><path d="M24 4L44 14V34L24 44L4 34V14L24 4Z" fill="#54B435"/><text x="24" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="sans-serif">E</text></svg>
  </div>
  <h1>Unsubscribe</h1>
  <p>Enter your email below to stop receiving emails from Ehyperise.</p>
  
  <div id="success-msg" class="success">
    ✅ You've been unsubscribed. You won't receive any more emails from us.
  </div>
  <div id="error-msg" class="error">
    ❌ Could not find that email in our list. You may already be unsubscribed.
  </div>

  <form id="unsub-form" onsubmit="return handleSubmit(event)">
    <input type="email" name="email" id="email-input" placeholder="your@email.com" required>
    <button type="submit">Unsubscribe →</button>
  </form>
  <p style="margin-top:20px;font-size:14px;color:#94a3b8;">We'll remove you immediately. No questions asked.</p>
</div>

<script>
async function handleSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('email-input').value;
  
  try {
    const resp = await fetch('https://n8n.assetshieldpartners.com/webhook/ehyperise-unsubscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email })
    });
    
    if (resp.ok) {
      document.getElementById('unsub-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  } catch(err) {
    document.getElementById('error-msg').style.display = 'block';
  }
  return false;
}
</script>
</body>
</html>
